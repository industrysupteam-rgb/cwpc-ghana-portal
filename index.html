<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CWPC Ghana - Official Member & Onboarding Portal</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- React & ReactDOM CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel compiler for JSX in browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              navy: '#0B192C',
              darkBlue: '#1E3E62',
              gold: '#FFD700',
              emerald: '#00A36C',
              accent: '#F1F6F9'
            }
          },
          animation: {
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'bounce-slow': 'bounce 2s infinite',
          }
        }
      }
    }
  </script>

  <style>
    /* Premium custom scrollbar styles */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #0B192C;
    }
    ::-webkit-scrollbar-thumb {
      background: #1E3E62;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #00A36C;
    }
  </style>
</head>
<body class="bg-brand-navy text-white min-h-screen font-sans antialiased">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      // System Routing States
      const [view, setView] = useState('landing'); // 'landing', 'portal', 'admin'
      const [leads, setLeads] = useState([]);
      const [showGate, setShowGate] = useState(false);
      const [currentLevel, setCurrentLevel] = useState('4'); // Default to Level 4 (Pro)
      const [unqualifiedMessage, setUnqualifiedMessage] = useState(false);
      
      // Admin Panel Configurations
      const [adminPassword, setAdminPassword] = useState('');
      const [isAdminAuthenticated, setIsAdminAuthenticated] = useState(false);
      const [inviteCode1, setInviteCode1] = useState('97163988');
      const [inviteCode2, setInviteCode2] = useState('97163988'); // Secondary invitation code

      // Form input states
      const [leadName, setLeadName] = useState('');
      const [leadPhone, setLeadPhone] = useState('');
      const [selectedCapital, setSelectedCapital] = useState('');

      // Portal Interactivity States
      const [activePortalTab, setActivePortalTab] = useState('guide'); // 'guide', 'toolkit'
      const [activeGuideStep, setActiveGuideStep] = useState(1);

      // Load configurations and leads on initial mount
      useEffect(() => {
        const storedLeads = JSON.parse(localStorage.getItem('cwpc_leads')) || [];
        setLeads(storedLeads);

        const storedCode1 = localStorage.getItem('cwpc_invite_code_1') || '97163988';
        const storedCode2 = localStorage.getItem('cwpc_invite_code_2') || '97163988';
        setInviteCode1(storedCode1);
        setInviteCode2(storedCode2);

        // Check if user is already qualified
        const isQualified = localStorage.getItem('cwpc_user_qualified') === 'true';
        if (!isQualified) {
          // Delay gate popup by 1.5 seconds for premium effect
          const timer = setTimeout(() => {
            setShowGate(true);
          }, 1500);
          return () => clearTimeout(timer);
        }
      }, []);

      // Function to rotate invitation codes (50/50 split)
      const getRotatedInviteUrl = () => {
        const rotationCounter = parseInt(localStorage.getItem('cwpc_rotation_counter') || '0');
        const nextCounter = rotationCounter + 1;
        localStorage.setItem('cwpc_rotation_counter', nextCounter.toString());

        // Alternate strictly between Code 1 and Code 2
        const chosenCode = (nextCounter % 2 === 1) ? inviteCode1 : inviteCode2;
        return `https://www.cwpc.vip/#/?InvitationCode=${chosenCode}`;
      };

      // Handle direct registration action click
      const handleRegisterClick = () => {
        const targetUrl = getRotatedInviteUrl();
        window.open(targetUrl, '_blank');
      };

      const handleGateSubmit = (e) => {
        e.preventDefault();

        if (selectedCapital === 'unqualified') {
          setUnqualifiedMessage(true);
          return;
        }

        // Prevent empty entries
        if (!leadName.trim() || !leadPhone.trim() || !selectedCapital) {
          return;
        }

        // Duplication check to maintain clean dataset
        const isDuplicate = leads.some(lead => lead.phone === leadPhone.trim());
        
        const newLead = {
          name: leadName.trim(),
          phone: leadPhone.trim(),
          capital: selectedCapital,
          timestamp: new Date().toLocaleString()
        };

        let updatedLeads = [...leads];
        if (!isDuplicate) {
          updatedLeads = [newLead, ...leads];
          setLeads(updatedLeads);
          localStorage.setItem('cwpc_leads', JSON.stringify(updatedLeads));
        }

        // Mark user as qualified in their browser memory
        localStorage.setItem('cwpc_user_qualified', 'true');
        setShowGate(false);
        setUnqualifiedMessage(false);
        setView('portal'); // Auto-transition to onboarding portal
      };

      const levelsData = {
        '3': {
          title: 'Starter • Level 3',
          deposit: 'GH₵ 2,400',
          daily: 'GH₵ 80',
          weekly: 'GH₵ 150',
          monthly: 'GH₵ 2,550',
          breakeven: '30 days'
        },
        '4': {
          title: 'Pro • Level 4',
          deposit: 'GH₵ 8,400',
          daily: 'GH₵ 300',
          weekly: 'GH₵ 400',
          monthly: 'GH₵ 10,600',
          breakeven: '21 days'
        },
        '5': {
          title: 'Elite • Level 5',
          deposit: 'GH₵ 22,400',
          daily: 'GH₵ 850',
          weekly: 'GH₵ 1,200',
          monthly: 'GH₵ 30,300',
          breakeven: '20 days'
        },
        '6': {
          title: 'VIP Partner • Level 6',
          deposit: 'GH₵ 62,400',
          daily: 'GH₵ 2,500',
          weekly: 'GH₵ 4,000',
          monthly: 'GH₵ 91,000',
          breakeven: '19 days'
        }
      };

      // Handle admin settings modifications
      const saveAdminSettings = () => {
        localStorage.setItem('cwpc_invite_code_1', inviteCode1);
        localStorage.setItem('cwpc_invite_code_2', inviteCode2);
        const notification = document.getElementById('save-alert');
        notification.classList.remove('hidden');
        setTimeout(() => notification.classList.add('hidden'), 3000);
      };

      // CSV Exporter for Admin Leads
      const exportCSV = () => {
        let csvContent = "data:text/csv;charset=utf-8,";
        csvContent += "Name,WhatsApp Number,Capital Tier,Timestamp\n";
        
        leads.forEach(lead => {
          csvContent += `"${lead.name}","${lead.phone}","${lead.capital}","${lead.timestamp}"\n`;
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `CWPC_Qualified_Leads_${new Date().toLocaleDateString()}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      return (
        <div className="flex flex-col min-h-screen">
          
          {/* Global Header */}
          <header className="border-b border-brand-darkBlue bg-brand-navy py-4 px-6 sticky top-0 z-40 backdrop-blur-md bg-opacity-95">
            <div className="max-w-6xl mx-auto flex justify-between items-center">
              <div className="flex items-center space-x-2 cursor-pointer" onClick={() => setView('landing')}>
                <div className="bg-brand-emerald p-2 rounded-lg text-white font-bold text-xl">C</div>
                <span className="font-bold text-lg tracking-wider text-white">CWPC <span className="text-brand-emerald">Ghana</span></span>
              </div>
              <div className="flex items-center space-x-4">
                <span className="bg-brand-darkBlue text-xs font-semibold px-3 py-1.5 rounded-full border border-brand-emerald text-brand-emerald animate-pulse">
                  🇬🇭 MoMo Payouts Active
                </span>
                <button 
                  onClick={() => setView(view === 'admin' ? 'landing' : 'admin')}
                  className="text-gray-400 hover:text-white transition-colors duration-200"
                  title="Silent Manager Portal"
                >
                  <i className="lucide-shield text-xl"></i>
                </button>
              </div>
            </div>
          </header>

          {}
          {view === 'landing' && (
            <main className="flex-grow max-w-6xl mx-auto px-4 py-8">
              {/* Promotional Hero Section */}
              <section className="text-center mb-12">
                <h4 className="text-brand-emerald text-sm font-bold tracking-widest uppercase mb-2">E-Commerce Order Fulfillment Platform</h4>
                <h1 className="text-4xl md:text-5xl lg:text-6xl font-extrabold leading-tight mb-4 text-white">
                  Turn Your Phone Into a <span className="text-brand-emerald">Daily MoMo</span> Income Stream
                </h1>
                <p className="text-gray-300 max-w-3xl mx-auto text-base md:text-lg">
                  Join thousands of Ghanaians fulfilling global e-commerce orders and securing passive daily income straight to Mobile Money (MTN, Telecel, or AT).
                </p>
                <div className="flex flex-wrap justify-center gap-3 mt-6">
                  <span className="bg-brand-darkBlue text-xs font-semibold px-4 py-2 rounded-full border border-gray-700">⚡ Instant MoMo Payouts</span>
                  <span className="bg-brand-darkBlue text-xs font-semibold px-4 py-2 rounded-full border border-gray-700">🛡️ No Experience Needed</span>
                  <span className="bg-brand-darkBlue text-xs font-semibold px-4 py-2 rounded-full border border-gray-700">💼 Withdraw Anytime</span>
                </div>
              </section>

              {/* Calculator Panel Container */}
              <section className="bg-brand-darkBlue rounded-2xl p-6 md:p-8 max-w-4xl mx-auto border border-gray-800 shadow-2xl mb-12">
                <div className="text-center mb-8">
                  <h2 className="text-2xl font-bold text-white">ROI Yield Calculator</h2>
                  <p className="text-gray-400 text-sm">Select a VIP level to see your guaranteed earnings</p>
                </div>

                {/* Level Toggle Buttons */}
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                  {Object.keys(levelsData).map((lvl) => (
                    <button
                      key={lvl}
                      onClick={() => setCurrentLevel(lvl)}
                      className={`p-4 rounded-xl border text-left transition-all duration-300 ${
                        currentLevel === lvl 
                          ? 'border-brand-emerald bg-brand-navy bg-opacity-80 ring-2 ring-brand-emerald shadow-lg' 
                          : 'border-gray-800 bg-brand-navy bg-opacity-30 hover:bg-opacity-50'
                      }`}
                    >
                      <div className="text-xs text-brand-emerald font-semibold mb-1">Level {lvl}</div>
                      <div className="text-lg font-bold text-white">{levelsData[lvl].deposit}</div>
                    </button>
                  ))}
                </div>

                {/* Interactive Yield Display Details */}
                <div className="bg-brand-navy rounded-xl p-6 border border-gray-800 mb-8">
                  <div className="flex justify-between items-center border-b border-gray-800 pb-4 mb-4">
                    <span className="font-semibold text-lg text-brand-emerald">{levelsData[currentLevel].title}</span>
                    <span className="text-xs bg-brand-darkBlue px-3 py-1 rounded-full text-gray-300">Minimum Deposit Required</span>
                  </div>
                  
                  <div className="grid grid-cols-2 gap-4">
                    <div className="bg-brand-darkBlue p-4 rounded-lg bg-opacity-50">
                      <span className="text-xs text-gray-400 block mb-1">Daily Income</span>
                      <span className="text-2xl font-extrabold text-brand-emerald">{levelsData[currentLevel].daily}</span>
                    </div>
                    <div className="bg-brand-darkBlue p-4 rounded-lg bg-opacity-50">
                      <span className="text-xs text-gray-400 block mb-1">Weekly Salary</span>
                      <span className="text-2xl font-extrabold text-brand-emerald">{levelsData[currentLevel].weekly}</span>
                    </div>
                    <div className="bg-brand-darkBlue p-4 rounded-lg bg-opacity-50">
                      <span className="text-xs text-gray-400 block mb-1">Break-Even Period</span>
                      <span className="text-2xl font-extrabold text-white">{levelsData[currentLevel].breakeven}</span>
                    </div>
                    <div className="bg-brand-darkBlue p-4 rounded-lg bg-opacity-50">
                      <span className="text-xs text-gray-400 block mb-1">Est. Monthly Return</span>
                      <span className="text-2xl font-extrabold text-brand-emerald">{levelsData[currentLevel].monthly}</span>
                    </div>
                  </div>

                  <p className="text-xs text-gray-400 mt-4 text-center">
                    *After your {levelsData[currentLevel].breakeven} break-even period, every cedi you earn is 100% pure profit. Complete automated daily tasks to withdraw to MoMo.
                  </p>
                </div>

                {/* Conversion Boost Dynamic Button */}
                <div className="text-center">
                  <button 
                    onClick={() => {
                      const isQualified = localStorage.getItem('cwpc_user_qualified') === 'true';
                      if (isQualified) {
                        setView('portal');
                      } else {
                        setShowGate(true);
                      }
                    }}
                    className="w-full md:w-auto bg-brand-emerald text-white px-8 py-4 rounded-xl font-bold text-lg hover:bg-opacity-95 transition-all duration-300 transform hover:scale-105 shadow-xl animate-pulse-slow flex items-center justify-center space-x-2 mx-auto"
                  >
                    <i className="lucide-rocket text-xl"></i>
                    <span>Secure Your VIP Activation Account Now</span>
                  </button>
                </div>
              </section>

              {/* Legitimacy Trust Banner section */}
              <section className="bg-brand-darkBlue bg-opacity-40 border border-brand-darkBlue p-6 rounded-2xl max-w-4xl mx-auto flex flex-col md:flex-row items-center justify-between space-y-4 md:space-y-0 md:space-x-6">
                <div className="flex items-center space-x-4">
                  <div className="bg-brand-emerald bg-opacity-10 text-brand-emerald p-3 rounded-full">
                    <i className="lucide-images text-2xl"></i>
                  </div>
                  <div>
                    <h3 className="font-bold text-lg text-white">Official CWPC Ghana Legitimacy & Social Proof</h3>
                    <p className="text-gray-400 text-sm">Join the physical meetups and awards held with active members in Accra.</p>
                  </div>
                </div>
                <a 
                  href="https://koduah39.pixieset.com/cwpc/" 
                  target="_blank" 
                  rel="noopener noreferrer"
                  className="bg-brand-navy hover:bg-brand-darkBlue border border-brand-emerald text-brand-emerald px-6 py-3 rounded-xl text-sm font-bold flex items-center space-x-2 transition-all duration-200 shrink-0"
                >
                  <i className="lucide-camera"></i>
                  <span>Browse Accra Meet & Greet Photos</span>
                </a>
              </section>
            </main>
          )}

          {}
          {view === 'portal' && (
            <main className="flex-grow max-w-5xl mx-auto px-4 py-8 w-full">
              {/* Back to Home Button */}
              <button 
                onClick={() => setView('landing')}
                className="text-gray-400 hover:text-white mb-6 flex items-center space-x-2 text-sm transition-all duration-200"
              >
                <i className="lucide-arrow-left"></i>
                <span>Back to Yield Calculator</span>
              </button>

              {/* Header Title */}
              <div className="mb-8 text-center md:text-left">
                <h1 className="text-3xl font-extrabold text-white flex flex-col md:flex-row md:items-center space-y-2 md:space-y-0 md:space-x-3 justify-center md:justify-start">
                  <span className="bg-brand-emerald text-white px-3 py-1 rounded text-xs tracking-wider uppercase font-bold self-center">Verification Successful</span>
                  <span>CWPC Portal & Employee Success Hub</span>
                </h1>
                <p className="text-gray-400 mt-2">Access your tasks, upgrade guides, and teambuilder toolkits here.</p>
              </div>

              {/* Main Tab Controls */}
              <div className="flex border-b border-brand-darkBlue mb-8">
                <button
                  onClick={() => setActivePortalTab('guide')}
                  className={`py-3 px-6 font-bold text-sm md:text-base border-b-2 transition-all duration-300 ${
                    activePortalTab === 'guide'
                      ? 'border-brand-emerald text-brand-emerald bg-brand-darkBlue bg-opacity-20'
                      : 'border-transparent text-gray-400 hover:text-white'
                  }`}
                >
                  Quick-Start VIP Member Guide
                </button>
                <button
                  onClick={() => setActivePortalTab('toolkit')}
                  className={`py-3 px-6 font-bold text-sm md:text-base border-b-2 transition-all duration-300 ${
                    activePortalTab === 'toolkit'
                      ? 'border-brand-emerald text-brand-emerald bg-brand-darkBlue bg-opacity-20'
                      : 'border-transparent text-gray-400 hover:text-white'
                  }`}
                >
                  Earn 10x More: Free Team-Builder Toolkit
                </button>
              </div>

              {/* TAB 1: VIP Member Onboarding Guide */}
              {activePortalTab === 'guide' && (
                <div className="space-y-8">
                  
                  {/* Step Interactive Container (Accordion Style) */}
                  <div className="bg-brand-darkBlue rounded-2xl p-6 border border-gray-800 shadow-xl space-y-4">
                    <h2 className="text-xl font-extrabold text-white mb-4 flex items-center space-x-2">
                      <i className="lucide-compass text-brand-emerald"></i>
                      <span>Step-by-Step Onboarding Interactive Map</span>
                    </h2>

                    {/* Step Tabs Indicators */}
                    <div className="flex justify-between items-center gap-1 md:gap-4 mb-6">
                      {[1, 2, 3, 4, 5].map((stepNum) => (
                        <button
                          key={stepNum}
                          onClick={() => setActiveGuideStep(stepNum)}
                          className={`flex-grow py-3 px-2 rounded-lg border text-center transition-all duration-300 ${
                            activeGuideStep === stepNum
                              ? 'bg-brand-emerald border-brand-emerald text-white font-extrabold scale-105'
                              : 'bg-brand-navy border-gray-800 text-gray-400 hover:bg-opacity-80'
                          }`}
                        >
                          <span className="hidden md:inline">Step </span>{stepNum}
                        </button>
                      ))}
                    </div>

                    {/* Dynamic Step Content Renderer */}
                    <div className="bg-brand-navy p-6 rounded-xl border border-gray-800 min-h-[220px] flex flex-col justify-between">
                      {activeGuideStep === 1 && (
                        <div>
                          <div className="flex items-center space-x-2 mb-3">
                            <span className="bg-brand-emerald bg-opacity-20 text-brand-emerald font-bold p-1 px-3 rounded-full text-xs">Step 1</span>
                            <h3 className="text-lg font-bold text-white">Create Your Official Account & Log In</h3>
                          </div>
                          <p className="text-gray-300 text-sm leading-relaxed mb-4">
                            Click the action button below to head to our secure, central platform. Use your active Mobile Money registration details to fill out the form. Make sure to choose a strong password you won't forget.
                          </p>
                          <ul className="text-xs text-gray-400 space-y-1 bg-brand-darkBlue p-3 rounded-lg border border-gray-800">
                            <li>• Use MTN, Telecel, or AT mobile numbers only.</li>
                            <li>• Confirm your registration page shows your referral manager successfully linked.</li>
                          </ul>
                        </div>
                      )}

                      {activeGuideStep === 2 && (
                        <div>
                          <div className="flex items-center space-x-2 mb-3">
                            <span className="bg-brand-emerald bg-opacity-20 text-brand-emerald font-bold p-1 px-3 rounded-full text-xs">Step 2</span>
                            <h3 className="text-lg font-bold text-white">Complete Your 4-Day Trial Tasks</h3>
                          </div>
                          <p className="text-gray-300 text-sm leading-relaxed mb-4">
                            Log into your dashboard on the registration site. Navigate to the **'Tasks'** or **'Order'** section at the bottom. Since your account starts as an Intern trial, enter the **Intern Zone** and click order grabbing buttons to secure your trial earnings.
                          </p>
                          <ul className="text-xs text-gray-400 space-y-1 bg-brand-darkBlue p-3 rounded-lg border border-gray-800">
                            <li>• Do this for 4 consecutive days to stack up your free trial bonuses!</li>
                            <li>• It takes less than 2 minutes of automated execution every day.</li>
                          </ul>
                        </div>
                      )}

                      {activeGuideStep === 3 && (
                        <div>
                          <div className="flex items-center space-x-2 mb-3">
                            <span className="bg-brand-emerald bg-opacity-20 text-brand-emerald font-bold p-1 px-3 rounded-full text-xs">Step 3</span>
                            <h3 className="text-lg font-bold text-white">Choose a VIP Level & Activate MoMo Withdrawals</h3>
                          </div>
                          <p className="text-gray-300 text-sm leading-relaxed mb-4">
                            Your trial is a training grounds. To secure permanent, daily profits and unlock unlimited MoMo withdrawals, you must activate a permanent VIP Level.
                          </p>
                          <div className="grid grid-cols-2 md:grid-cols-4 gap-3 my-2 text-xs">
                            <div className="bg-brand-darkBlue p-2 rounded text-center border border-gray-800">
                              <span className="font-bold block">Level 3</span>
                              <span className="text-brand-emerald">GH₵ 2,400</span>
                            </div>
                            <div className="bg-brand-darkBlue p-2 rounded text-center border border-gray-800">
                              <span className="font-bold block">Level 4</span>
                              <span className="text-brand-emerald">GH₵ 8,400</span>
                            </div>
                            <div className="bg-brand-darkBlue p-2 rounded text-center border border-gray-800">
                              <span className="font-bold block">Level 5</span>
                              <span className="text-brand-emerald">GH₵ 22,400</span>
                            </div>
                            <div className="bg-brand-darkBlue p-2 rounded text-center border border-gray-800">
                              <span className="font-bold block">Level 6</span>
                              <span className="text-brand-emerald">GH₵ 62,400+</span>
                            </div>
                          </div>
                        </div>
                      )}

                      {activeGuideStep === 4 && (
                        <div>
                          <div className="flex items-center space-x-2 mb-3">
                            <span className="bg-brand-emerald bg-opacity-20 text-brand-emerald font-bold p-1 px-3 rounded-full text-xs">Step 4</span>
                            <h3 className="text-lg font-bold text-white">Perform Your MoMo Deposit</h3>
                          </div>
                          <p className="text-gray-300 text-sm leading-relaxed mb-4">
                            On the platform, go to **'Deposit'** (or **'Recharge'**), select your VIP Level capital amount, and complete the instant MoMo transaction. Take a screenshot of your successful receipt and copy the Transaction ID.
                          </p>
                          <ul className="text-xs text-gray-400 space-y-1 bg-brand-darkBlue p-3 rounded-lg border border-gray-800">
                            <li>• Submit the transaction ID into the deposit verification page for instant approval.</li>
                            <li>• Never reuse old recharge numbers; always request a fresh deposit screen!</li>
                          </ul>
                        </div>
                      )}

                      {activeGuideStep === 5 && (
                        <div>
                          <div className="flex items-center space-x-2 mb-3">
                            <span className="bg-brand-emerald bg-opacity-20 text-brand-emerald font-bold p-1 px-3 rounded-full text-xs">Step 5</span>
                            <h3 className="text-lg font-bold text-white">Bind Your MoMo Wallet for Daily Withdrawals</h3>
                          </div>
                          <p className="text-gray-300 text-sm leading-relaxed mb-4">
                            Secure your automated payouts. Go to your **Profile** or **Account settings** ➡️ click **'Bind MoMo Card'** (or **'Withdrawal Method'**). Fill in your mobile network, registered MoMo name, and phone number.

                          <ul className="text-xs text-brand-emerald space-y-1 bg-brand-darkBlue p-3 rounded-lg border border-gray-800">
                            <li>✓ Withdrawals clear every 24 hours directly into your personal Mobile Money account.</li>
                            <li>✓ Daily commissions build automatically under system autopilot order-fulfillment.</li>
                          </ul>
                        </div>
                      )}

                      {/* Navigation Buttons for Onboarding Map */}
                      <div className="flex justify-between items-center mt-6 pt-4 border-t border-gray-800">
                        <button
                          disabled={activeGuideStep === 1}
                          onClick={() => setActiveGuideStep(activeGuideStep - 1)}
                          className="bg-brand-darkBlue text-xs px-4 py-2 rounded border border-gray-700 disabled:opacity-40"
                        >
                          Previous Step
                        </button>
                        <button
                          disabled={activeGuideStep === 5}
                          onClick={() => setActiveGuideStep(activeGuideStep + 1)}
                          className="bg-brand-emerald text-xs px-4 py-2 rounded text-white font-bold disabled:opacity-40"
                        >
                          Next Step
                        </button>
                      </div>
                    </div>
                  </div>

                  {/* Pulsing action button linked to direct registration URL (Uses rotated link dynamically) */}
                  <div className="text-center bg-brand-darkBlue p-8 rounded-2xl border border-gray-800">
                    <h3 className="text-lg font-extrabold mb-2 text-white">Ready to Lock Your Activation?</h3>
                    <p className="text-gray-400 text-sm mb-6">Register now to start your 4-day trial and claim free earnings.</p>
                    <button
                      onClick={handleRegisterClick}
                      className="w-full md:w-auto bg-brand-emerald text-white px-10 py-4 rounded-xl font-extrabold text-xl hover:bg-opacity-95 transition-all duration-300 transform hover:scale-105 shadow-xl animate-pulse-slow inline-flex items-center justify-center space-x-3"
                    >
                      <i className="lucide-sparkles"></i>
                      <span>Click Here to Register & Activate Now</span>
                    </button>
                    <p className="text-xs text-gray-400 mt-4">
                      *By clicking you will be securely redirected to register under our verified manager link.
                    </p>
                  </div>
                </div>
              )}

              {}
              {activePortalTab === 'toolkit' && (
                <div className="bg-brand-darkBlue rounded-2xl p-6 md:p-8 border border-gray-800 shadow-xl space-y-6">
                  <div>
                    <h2 className="text-xl font-extrabold text-white mb-2 flex items-center space-x-2">
                      <i className="lucide-copy text-brand-emerald"></i>
                      <span>Free Auto-Recruiting & Duplication Engine</span>
                    </h2>
                    <p className="text-gray-300 text-sm">
                      Did you know you can multiply your daily income by building your own team on autopilot? Copy our exact, proven system to attract active partners:
                    </p>
                  </div>

                  {/* Step List Copy Elements */}
                  <div className="space-y-4">
                    <div className="bg-brand-navy p-4 rounded-xl border border-gray-800 flex items-start space-x-3">
                      <span className="bg-brand-darkBlue border border-brand-emerald text-brand-emerald rounded-full w-6 h-6 flex items-center justify-center text-xs font-bold shrink-0">1</span>
                      <div>
                        <h4 className="font-bold text-white text-sm">Post Ads on Jiji Ghana</h4>
                        <p className="text-gray-400 text-xs mt-1">Register as an employer on jiji.com.gh and post a free ad under Jobs/Online Jobs category.</p>
                      </div>
                    </div>

                    <div className="bg-brand-navy p-4 rounded-xl border border-gray-800 flex items-start space-x-3">
                      <span className="bg-brand-darkBlue border border-brand-emerald text-brand-emerald rounded-full w-6 h-6 flex items-center justify-center text-xs font-bold shrink-0">2</span>
                      <div>
                        <h4 className="font-bold text-white text-sm">High-Converting Ad Copy Template</h4>
                        <div className="bg-brand-darkBlue p-3 rounded-lg text-xs mt-2 border border-gray-800 text-gray-300 font-mono relative">
                          <strong>Title:</strong> Automated MoMo Capital Growth Partner<br/>
                          <strong>Salary:</strong> GH₵ 1,500 - 3,000 Monthly<br/>
                          <strong>Description:</strong> We are looking for serious partners with capital ready to activate VIP orders and secure daily compounding Mobile Money commissions.
                        </div>
                      </div>
                    </div>

                    <div className="bg-brand-navy p-4 rounded-xl border border-gray-800 flex items-start space-x-3">
                      <span className="bg-brand-darkBlue border border-brand-emerald text-brand-emerald rounded-full w-6 h-6 flex items-center justify-center text-xs font-bold shrink-0">3</span>
                      <div>
                        <h4 className="font-bold text-white text-sm">Autopilot Routing (Direct to your Domain)</h4>
                        <p className="text-gray-400 text-xs mt-1">
                          Paste your custom domain link (`https://gh.cwpcpartner.com`) in the ad description with the instruction: 
                          <span className="text-white italic font-semibold"> "All application registrations are completely automated. Go to our portal link to begin."</span>
                        </p>
                      </div>
                    </div>
                  </div>

                  <div className="bg-brand-navy p-4 rounded-xl border border-brand-emerald bg-opacity-20 text-center">
                    <p className="text-xs text-brand-emerald font-semibold">
                      Your recruits will use the calculator, qualify themselves, register under your team, and activate on autopilot!
                    </p>
                  </div>
                </div>
              )}
            </main>
          )}

          {}
          {view === 'admin' && (
            <main className="flex-grow max-w-5xl mx-auto px-4 py-8 w-full">
              {!isAdminAuthenticated ? (
                // Admin Login Panel
                <div className="max-w-md mx-auto bg-brand-darkBlue rounded-2xl p-8 border border-gray-800 shadow-2xl mt-12">
                  <div className="text-center mb-6">
                    <div className="bg-brand-navy border border-brand-emerald text-brand-emerald w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-3">
                      <i className="lucide-lock text-xl"></i>
                    </div>
                    <h2 className="text-2xl font-bold text-white">Silent Manager Login</h2>
                    <p className="text-gray-400 text-xs mt-1">Enter your password to access leads list and configurations</p>
                  </div>

                  <form onSubmit={(e) => {
                    e.preventDefault();
                    if (adminPassword === '5Goman/2026TwDRAdnU') {
                      setIsAdminAuthenticated(true);
                    } else {
                      alert('Error: Access Denied. Secure credentials invalid.');
                    }
                  }} className="space-y-4">
                    <div>
                      <label className="text-xs text-gray-400 font-semibold block mb-1">Secure Password</label>
                      <input 
                        type="password" 
                        value={adminPassword}
                        onChange={(e) => setAdminPassword(e.target.value)}
                        className="w-full bg-brand-navy border border-gray-800 rounded-lg py-3 px-4 text-white text-sm focus:outline-none focus:border-brand-emerald"
                        placeholder="••••••••••••••••"
                      />
                    </div>
                    <button 
                      type="submit"
                      className="w-full bg-brand-emerald hover:bg-opacity-95 text-white font-bold py-3 rounded-lg transition-all duration-200 text-sm"
                    >
                      Authenticate Secure Gateway
                    </button>
                  </form>
                </div>
              ) : (
                // Authenticated Admin Dashboard Controls
                <div className="space-y-8">
                  {/* Save Alert */}
                  <div id="save-alert" className="hidden bg-brand-emerald bg-opacity-25 border border-brand-emerald text-brand-emerald px-4 py-3 rounded-lg text-sm font-semibold mb-4 text-center">
                    ✓ Configurations saved successfully in local cache!
                  </div>

                  {/* Header Options */}
                  <div className="flex flex-col md:flex-row justify-between items-center space-y-4 md:space-y-0">
                    <div>
                      <h1 className="text-3xl font-extrabold text-white">Security & Controls Dashboard</h1>
                      <p className="text-gray-400 text-sm mt-1">Manage qualified leads and rotation invitation codes.</p>
                    </div>
                    <button 
                      onClick={() => {
                        setIsAdminAuthenticated(false);
                        setAdminPassword('');
                        setView('landing');
                      }}
                      className="bg-red-900 bg-opacity-30 border border-red-800 hover:bg-opacity-50 text-red-200 text-xs px-4 py-2 rounded-lg transition-all duration-200"
                    >
                      Logout & Terminate Session
                    </button>
                  </div>

                  {/* Dynamic Settings Area (Rotation configuration) */}
                  <section className="bg-brand-darkBlue p-6 rounded-2xl border border-gray-800 shadow-xl">
                    <h3 className="font-extrabold text-lg mb-4 text-white flex items-center space-x-2">
                      <i className="lucide-settings text-brand-emerald"></i>
                      <span>Lead Traffic Referral Rotator Settings</span>
                    </h3>
                    <p className="text-gray-400 text-xs mb-6">
                      The system automatically alternates (50/50 split) registrations between these codes. Enter your two CWPC invite codes here to build both teams simultaneously.
                    </p>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      <div>
                        <label className="text-xs text-gray-400 block mb-1">Primary Invite Code (Code A)</label>
                        <input 
                          type="text" 
                          value={inviteCode1}
                          onChange={(e) => setInviteCode1(e.target.value)}
                          className="w-full bg-brand-navy border border-gray-800 rounded-lg py-3 px-4 text-white text-sm focus:outline-none focus:border-brand-emerald font-mono font-bold"
                          placeholder="97163988"
                        />
                      </div>
                      <div>
                        <label className="text-xs text-gray-400 block mb-1">Secondary Invite Code (Code B)</label>
                        <input 
                          type="text" 
                          value={inviteCode2}
                          onChange={(e) => setInviteCode2(e.target.value)}
                          className="w-full bg-brand-navy border border-gray-800 rounded-lg py-3 px-4 text-white text-sm focus:outline-none focus:border-brand-emerald font-mono font-bold"
                          placeholder="Enter Second Invitation Code"
                        />
                      </div>
                    </div>

                    <button 
                      onClick={saveAdminSettings}
                      className="mt-6 bg-brand-emerald text-white px-6 py-3 rounded-lg font-bold text-sm hover:bg-opacity-95 transition-all duration-200"
                    >
                      Save Rotator Codes
                    </button>
                  </section>

                  {}
                  <section className="bg-brand-darkBlue rounded-2xl border border-gray-800 shadow-xl overflow-hidden">
                    <div className="p-6 border-b border-gray-800 flex justify-between items-center">
                      <div>
                        <h3 className="font-bold text-lg text-white">Qualified Captured Leads ({leads.length})</h3>
                        <p className="text-gray-400 text-xs mt-1">Showing all leads with ready starting capital</p>
                      </div>
                      <div className="flex space-x-3">
                        <button 
                          onClick={exportCSV}
                          className="bg-brand-navy border border-gray-800 hover:bg-brand-navy text-xs px-4 py-2.5 rounded-lg text-brand-emerald border-brand-emerald font-bold transition-all duration-200"
                        >
                          📥 Export as CSV
                        </button>
                        <button 
                          onClick={() => {
                            if(window.confirm("Are you sure you want to completely wipe out the leads lists stored inside local storage?")) {
                              setLeads([]);
                              localStorage.removeItem('cwpc_leads');
                            }
                          }}
                          className="bg-red-900 bg-opacity-20 hover:bg-opacity-40 border border-red-800 text-red-200 text-xs px-3 py-2 rounded-lg transition-all duration-200"
                        >
                          Clear Database
                        </button>
                      </div>
                    </div>

                    {leads.length === 0 ? (
                      <div className="p-12 text-center text-gray-500 text-sm">
                        No qualified leads have registered yet. Keep your Jiji traffic running!
                      </div>
                    ) : (
                      <div className="overflow-x-auto">
                        <table className="w-full text-left text-sm">
                          <thead className="bg-brand-navy text-xs uppercase text-gray-400 border-b border-gray-800">
                            <tr>
                              <th className="py-4 px-6">Name</th>
                              <th className="py-4 px-6">WhatsApp Number</th>
                              <th className="py-4 px-6">Declared Capital Tier</th>
                              <th className="py-4 px-6">Captured On</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-gray-800">
                            {leads.map((lead, idx) => (
                              <tr key={idx} className="hover:bg-brand-navy hover:bg-opacity-40">
                                <td className="py-4 px-6 font-bold text-white">{lead.name}</td>
                                <td className="py-4 px-6 font-mono text-brand-emerald">{lead.phone}</td>
                                <td className="py-4 px-6">
                                  <span className="bg-brand-navy text-brand-emerald border border-brand-emerald text-xs px-3 py-1 rounded-full font-semibold">
                                    {lead.capital}
                                  </span>
                                </td>
                                <td className="py-4 px-6 text-xs text-gray-400">{lead.timestamp}</td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    )}
                  </section>
                </div>
              )}
            </main>
          )}

          {}
          {showGate && (
            <div className="fixed inset-0 bg-brand-navy bg-opacity-90 backdrop-blur-md flex items-center justify-center p-4 z-50">
              <div className="bg-brand-darkBlue border border-gray-800 w-full max-w-lg rounded-2xl p-6 md:p-8 shadow-2xl relative">
                
                <div className="text-center mb-6">
                  <div className="bg-brand-emerald bg-opacity-10 text-brand-emerald w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-3 border border-brand-emerald">
                    <i className="lucide-shield-check text-3xl"></i>
                  </div>
                  <h2 className="text-2xl font-extrabold text-white">Official CWPC Ghana Gate</h2>
                  <p className="text-gray-400 text-xs mt-1">Please verify your details and capital to unlock calculations.</p>
                </div>

                {/* Form Action Qualification */}
                <form onSubmit={handleGateSubmit} className="space-y-4">
                  <div>
                    <label className="text-xs text-gray-400 font-semibold block mb-1">Full Legal Name</label>
                    <input 
                      type="text" 
                      required
                      value={leadName}
                      onChange={(e) => setLeadName(e.target.value)}
                      className="w-full bg-brand-navy border border-gray-800 rounded-lg py-3 px-4 text-white text-sm focus:outline-none focus:border-brand-emerald"
                      placeholder="e.g. Isaac Agyenim Boateng"
                    />
                  </div>

                  <div>
                    <label className="text-xs text-gray-400 font-semibold block mb-1">WhatsApp Phone Number</label>
                    <input 
                      type="tel" 
                      required
                      value={leadPhone}
                      onChange={(e) => setLeadPhone(e.target.value)}
                      className="w-full bg-brand-navy border border-gray-800 rounded-lg py-3 px-4 text-white text-sm focus:outline-none focus:border-brand-emerald"
                      placeholder="e.g. 0206628139"
                    />
                  </div>

                  <div>
                    <label className="text-xs text-gray-400 font-semibold block mb-1">Starting MoMo Capital Ready to Deploy</label>
                    <select
                      required
                      value={selectedCapital}
                      onChange={(e) => setSelectedCapital(e.target.value)}
                      className="w-full bg-brand-navy border border-gray-800 rounded-lg py-3 px-4 text-white text-sm focus:outline-none focus:border-brand-emerald"
                    >
                      <option value="" disabled>Select Capital Range...</option>
                      <option value="GH₵ 2,400 (VIP 3)">GH₵ 2,400 (VIP 3 Activation)</option>
                      <option value="GH₵ 8,400 (VIP 4)">GH₵ 8,400 (VIP 4 Activation)</option>
                      <option value="GH₵ 22,400 (VIP 5)">GH₵ 22,400 (VIP 5 Activation)</option>
                      <option value="GH₵ 62,400 (VIP 6)">GH₵ 62,400+ (VIP 6 Activation)</option>
                      <option value="unqualified">I have less than GH₵ 2,400 starting capital</option>
                    </select>
                  </div>

                  {unqualifiedMessage && (
                    <div className="bg-red-950 bg-opacity-30 border border-red-800 text-red-200 text-xs p-4 rounded-lg leading-relaxed">
                      ❌ <strong>Account Verification Blocked:</strong> Our system requires a minimum starting capital of <strong>GH₵ 2,400</strong> to activate permanent VIP commission tasks and MoMo withdrawals. Please return when your starting capital is fully prepared!
                    </div>
                  )}

                  {!unqualifiedMessage && (
                    <button
                      type="submit"
                      className="w-full bg-brand-emerald text-white font-bold py-3.5 rounded-lg text-sm hover:bg-opacity-95 transition-all duration-200 mt-2"
                    >
                      Verify Account & Access Calculator
                    </button>
                  )}
                </form>

                <p className="text-[10px] text-gray-500 text-center mt-4">
                  *Your security is our priority. Your Mobile Money details are encrypted and protected at all times.
                </p>
              </div>
            </div>
          )}

          {}
          {/* Global Footer */}
          <footer className="border-t border-brand-darkBlue bg-brand-navy py-6 text-center text-xs text-gray-500 mt-auto">
            <div className="max-w-6xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center space-y-4 md:space-y-0">
              <span>© 2026 CWPC Ghana. All rights reserved. Registered fulfillment partner.</span>
              <div className="flex space-x-6">
                <span className="hover:text-white cursor-pointer" onClick={() => setView('landing')}>Home</span>
                <span className="hover:text-white cursor-pointer" onClick={() => {
                  const isQualified = localStorage.getItem('cwpc_user_qualified') === 'true';
                  if (isQualified) setView('portal'); else setShowGate(true);
                }}>Member Portal</span>
                <span className="hover:text-white cursor-pointer" onClick={() => setView('admin')}>Admin</span>
              </div>
            </div>
          </footer>

        </div>
      );
    }

    // Render the App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
